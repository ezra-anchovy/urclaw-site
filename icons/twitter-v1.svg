<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- V1: Bold UC monogram with claw integration -->
  <defs>
    <linearGradient id="bg-grad-v1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E53;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letter-grad-v1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF5F0;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bg-grad-v1)"/>
  
  <!-- UC monogram with claw motif -->
  <g transform="translate(200, 200)">
    <!-- U with claw pincer bottom -->
    <path d="M -100 -80 L -100 20 Q -100 60 -60 60 Q -20 60 -20 20 L -20 -80 L -50 -80 L -50 20 Q -50 35 -60 35 Q -70 35 -70 20 L -70 -80 Z" 
          fill="url(#letter-grad-v1)" stroke="#FF4444" stroke-width="2"/>
    
    <!-- Left claw pincer accent on U -->
    <path d="M -100 15 L -115 5 L -110 20 Z" fill="#FFD700" opacity="0.8"/>
    <path d="M -20 15 L -5 5 L -10 20 Z" fill="#FFD700" opacity="0.8"/>
    
    <!-- C with claw curve -->
    <path d="M 80 -20 Q 50 -80 0 -80 Q -30 -80 -30 -50 L 0 -50 Q 10 -50 10 -40 Q 10 40 0 40 L -30 40 Q -30 70 0 70 Q 50 70 80 10" 
          fill="none" stroke="url(#letter-grad-v1)" stroke-width="30" stroke-linecap="round"/>
    
    <!-- Claw tips on C opening -->
    <ellipse cx="75" cy="-25" rx="8" ry="12" fill="#FFD700" transform="rotate(-20 75 -25)"/>
    <ellipse cx="78" cy="15" rx="8" ry="12" fill="#FFD700" transform="rotate(20 78 15)"/>
  </g>
  
  <!-- Subtle claw accent bottom right -->
  <path d="M 340 320 Q 350 340 360 330 L 355 320 Z" fill="#FFD700" opacity="0.6"/>
  <path d="M 350 325 Q 360 345 370 335 L 365 325 Z" fill="#FFD700" opacity="0.6"/>
</svg>
