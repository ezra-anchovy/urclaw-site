<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <defs>
    <!-- Warm coral-to-peach gradient for light mode -->
    <linearGradient id="warm-bg-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f5"/>
      <stop offset="50%" style="stop-color:#ffe4e6"/>
      <stop offset="100%" style="stop-color:#fecdd3"/>
    </linearGradient>
    <!-- Inner highlight -->
    <radialGradient id="inner-glow-light" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <!-- Lobster glow -->
    <filter id="glow-light" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon Circle -->
  <circle cx="24" cy="24" r="22" fill="url(#warm-bg-light)"/>
  <circle cx="24" cy="24" r="20" fill="url(#inner-glow-light)"/>
  <circle cx="24" cy="24" r="20" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-opacity="0.5"/>
  
  <!-- Lobster -->
  <text x="24" y="32" text-anchor="middle" font-size="20" filter="url(#glow-light)">🦞</text>
  
  <!-- UrClaw Text (white for dark backgrounds, coral accent) -->
  <text x="56" y="32" font-family="Space Grotesk, Inter, sans-serif" font-size="24" font-weight="700" fill="#fafafa">Ur<tspan fill="#fb7185">Claw</tspan></text>
</svg>