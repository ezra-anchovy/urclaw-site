<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64">
  <defs>
    <!-- Warm coral-to-peach gradient - inviting and consumer-friendly -->
    <linearGradient id="warm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f5"/>
      <stop offset="50%" style="stop-color:#ffe4e6"/>
      <stop offset="100%" style="stop-color:#fecdd3"/>
    </linearGradient>
    <!-- Inner highlight for 3D feel -->
    <radialGradient id="inner-glow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <!-- Lobster glow effect -->
    <filter id="lobster-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft drop shadow -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#f43f5e" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Icon circle with soft shadow -->
  <circle cx="32" cy="32" r="28" fill="url(#warm-bg)" filter="url(#soft-shadow)"/>
  <circle cx="32" cy="32" r="26" fill="url(#inner-glow)"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#fb7185" stroke-width="2" stroke-opacity="0.6"/>
  
  <!-- Lobster with glow -->
  <text x="32" y="42" text-anchor="middle" font-size="26" filter="url(#lobster-glow)">🦞</text>
  
  <!-- UrClaw Text - coral accent to match logo -->
  <text x="72" y="42" font-family="Space Grotesk, Inter, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1f2937" letter-spacing="-0.5">Ur<tspan fill="#f43f5e">Claw</tspan></text>
</svg>