<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Warm coral-to-peach gradient - inviting and consumer-friendly -->
    <linearGradient id="warm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f5"/>
      <stop offset="50%" style="stop-color:#ffe4e6"/>
      <stop offset="100%" style="stop-color:#fecdd3"/>
    </linearGradient>
    <!-- Subtle inner shadow for depth -->
    <radialGradient id="inner-glow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <!-- Lobster glow effect -->
    <filter id="lobster-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft drop shadow for the circle -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#f43f5e" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Main circle with soft shadow -->
  <circle cx="32" cy="32" r="29" fill="url(#warm-bg)" filter="url(#soft-shadow)"/>
  
  <!-- Inner highlight for 3D feel -->
  <circle cx="32" cy="32" r="27" fill="url(#inner-glow)"/>
  
  <!-- Warm coral border ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#fb7185" stroke-width="2" stroke-opacity="0.6"/>
  
  <!-- Lobster emoji with glow to make it pop -->
  <text x="32" y="44" text-anchor="middle" font-size="30" filter="url(#lobster-glow)">🦞</text>
</svg>